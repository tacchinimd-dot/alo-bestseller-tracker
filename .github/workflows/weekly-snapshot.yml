name: Weekly Alo Bestseller Snapshot

on:
  schedule:
    # 매주 월요일 00:00 UTC = 월요일 09:00 KST
    - cron: '0 0 * * 1'
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write         # CSV self-commit 위해 필수

concurrency:
  group: weekly-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium (JSON 차단 시 폴백 대비)
        run: python -m playwright install --with-deps chromium

      - name: Run snapshot collector
        run: python alo_bestseller_snapshot.py

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alo_bestsellers_snapshots.csv
          if git diff --staged --quiet; then
            echo "변경 없음 — 수집 실패 또는 동일 데이터. 커밋 생략."
          else
            git commit -m "chore: weekly snapshot $(date -u +%F)"
            git push
          fi
